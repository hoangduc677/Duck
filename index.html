<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỷ yếu lớp</title>

<link rel="stylesheet" href="style.css">
<link rel="preload" as="image" href="cover.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="skip">Bỏ qua</div>
  <div id="text"></div>
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Nhập biệt danh</h2>
  <input id="nick" placeholder="Biệt danh...">
  <button onclick="login()">Vào</button>
</div>

<!-- USER -->
<div id="userTag"></div>

<!-- HERO -->
<header>
  <div class="overlay">
    <h1>Chuyến Tàu Thanh Xuân 2022 - 2026</h1>
    <p id="countdown"></p>
  </div>
</header>

<!-- GALLERY -->
<section class="gallery">
  <img src="cover.jpg" class="reveal" loading="lazy">
  <img src="group.jpg" class="reveal" loading="lazy">
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightboxImg">
</div>

<!-- GUESTBOOK -->
<section class="guestbook">
  <h2>💌 Lời nhắn</h2>
  <textarea id="msg" placeholder="Viết gì đó..."></textarea><br>
  <button onclick="sendMsg()">Gửi</button>
  <div id="messages"></div>
</section>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>
<div class="music" id="btn">▶</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script src="script.js"></script>

</body>
</html>
